name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: server (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: server/go.sum
      - name: go vet
        working-directory: server
        run: go vet ./...
      - name: go test
        working-directory: server
        run: go test -race ./...

  sdk:
    name: sdk (typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - name: install
        working-directory: sdk
        run: npm ci || npm install
      - name: build
        working-directory: sdk
        run: npm run build

  player:
    name: player (react)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: player/package-lock.json
      - name: install
        working-directory: player
        run: npm ci || npm install
      - name: typecheck
        working-directory: player
        run: npx tsc --noEmit
      - name: build
        working-directory: player
        run: npm run build
